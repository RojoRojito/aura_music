name: aura_music
description: AURA Music Player - Modular & Feature-Rich
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.36
  equalizer_flutter: ^0.0.1
  audio_service: ^0.18.12
  on_audio_query: ^2.9.0
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  palette_generator: ^0.3.3+3
  flutter_slidable: ^3.0.1
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  rxdart: ^0.27.7
  cupertino_icons: ^1.0.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
