name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Respaldar Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak

          # 2. Respaldar archivos Kotlin nativos
          mkdir -p native_backup
          cp -r android/app/src/main/kotlin/com/daviddev/aura_music/ native_backup/ 2>/dev/null || true

          # 3. Respaldar just_audio_local
          if [ -d "just_audio_local" ]; then
            cp -r just_audio_local just_audio_local.bak
          fi

          # 4. Borrar carpeta android
          rm -rf android

          # 5. Regenerar desde cero con org correcto
          flutter create . --platforms android --org com.daviddev

          # 6. Restaurar Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 7. Restaurar archivos Kotlin nativos (overwrite generated ones)
          if [ -d "native_backup/com/daviddev/aura_music" ]; then
            mkdir -p android/app/src/main/kotlin/com/daviddev/aura_music/
            cp -r native_backup/com/daviddev/aura_music/* android/app/src/main/kotlin/com/daviddev/aura_music/
          fi

          # 8. Restaurar just_audio_local
          if [ -d "just_audio_local.bak" ]; then
            cp -r just_audio_local.bak just_audio_local
          fi

          # 9. NO parchear Kotlin — usar la version que flutter create genera

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Remove tests
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7