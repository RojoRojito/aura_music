name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Backup Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak

          # 2. Backup native Kotlin files (full directory tree)
          mkdir -p native_backup
          cp -r android/app/src/main/kotlin/com/daviddev/aura_music native_backup/aura_music 2>/dev/null || true

          # 3. Backup just_audio_local
          if [ -d "just_audio_local" ]; then
            cp -r just_audio_local just_audio_local.bak
          fi

          # 4. Delete android folder
          rm -rf android

          # 5. Regenerate from scratch with correct org
          flutter create . --platforms android --org com.daviddev

          # 6. Restore Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 7. Restore ALL native Kotlin files
          rm -rf android/app/src/main/kotlin/com/daviddev/aura_music
          mkdir -p android/app/src/main/kotlin/com/daviddev
          cp -rf native_backup/aura_music android/app/src/main/kotlin/com/daviddev/aura_music
          echo "=== Restored Kotlin files ==="
          find android/app/src/main/kotlin/com/daviddev/aura_music -type f

          # 8. Restore just_audio_local
          if [ -d "just_audio_local.bak" ]; then
            cp -r just_audio_local.bak just_audio_local
          fi

          # 9. Delete any flutter-generated MainActivity that could shadow ours
          rm -rf android/app/src/main/kotlin/com/example/

          # 10. Verify regenerated files
          echo "=== compileSdk ==="
          grep "compileSdk" android/app/build.gradle || true
          echo "=== Kotlin in settings.gradle ==="
          grep "kotlin" android/settings.gradle || true

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Patch on_audio_query for AGP 8+ compatibility
        run: |
          OAP_BG=""
          for pattern in "*/on_audio_query_android/android/build.gradle" "*/on_audio_query/android/build.gradle"; do
            OAP_BG=$(find ${PUB_CACHE:-$HOME/.pub-cache} $HOME/.pub-cache /opt/hostedtoolcache -path "$pattern" 2>/dev/null | head -1)
            [ -n "$OAP_BG" ] && break
          done
          if [ -z "$OAP_BG" ]; then
            OAP_BG=$(find / -maxdepth 8 -path "*/on_audio_query*" -name "build.gradle" 2>/dev/null | grep -v "/example/" | head -1)
          fi
          echo "Found: $OAP_BG"
          if [ -n "$OAP_BG" ]; then
            python3 - "$OAP_BG" << 'PYEOF'
          import re, sys

          path = sys.argv[1]
          with open(path, 'r') as f:
              content = f.read()

          # Fix Kotlin and AGP versions in buildscript block
          content = content.replace("ext.kotlin_version = '1.6.10'", "ext.kotlin_version = '1.8.22'")
          content = content.replace("classpath 'com.android.tools.build:gradle:4.1.3'", "classpath 'com.android.tools.build:gradle:8.1.0'")

          # Replace the android { } block properly using brace counting
          # The old regex r'android \{[^}]+\}' was broken: [^}]+ stops at the
          # FIRST closing brace, so nested blocks (sourceSets, defaultConfig, etc.)
          # only matched partially, leaving orphaned '}' in the file and
          # causing a Gradle syntax error.
          def find_android_block(text):
              """Return (start, end) of the complete android { ... } block."""
              m = re.search(r'\bandroid\s*\{', text)
              if not m:
                  return None, None
              depth = 0
              i = m.start()
              while i < len(text):
                  if text[i] == '{':
                      depth += 1
                  elif text[i] == '}':
                      depth -= 1
                      if depth == 0:
                          return m.start(), i + 1
                  i += 1
              return None, None

          start, end = find_android_block(content)
          if start is not None:
              new_block = (
                  'android {\n'
                  '    namespace "com.lucasjosino.on_audio_query"\n'
                  '    compileSdk 34\n\n'
                  '    sourceSets {\n'
                  "        main.java.srcDirs += 'src/main/kotlin'\n"
                  '    }\n'
                  '    defaultConfig {\n'
                  '        minSdkVersion 16\n'
                  '    }\n'
                  '    compileOptions {\n'
                  '        sourceCompatibility JavaVersion.VERSION_17\n'
                  '        targetCompatibility JavaVersion.VERSION_17\n'
                  '    }\n'
                  '    kotlinOptions {\n'
                  '        jvmTarget = "17"\n'
                  '    }\n'
                  '}'
              )
              content = content[:start] + new_block + content[end:]
              print("=== Android block patched successfully ===")
          else:
              print("WARNING: android block not found, skipping block replacement")

          with open(path, 'w') as f:
              f.write(content)
          print("=== Patched file ===")
          print(content)
          PYEOF
          else
            echo "ERROR: on_audio_query build.gradle not found!"
            find / -maxdepth 6 -name "*on_audio_query*" 2>/dev/null | head -20
          fi

      - name: Remove tests
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
