name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Respaldar Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak
          
          # 2. Borrar carpeta android para evitar conflictos
          rm -rf android
          
          # 3. Regenerar desde cero
          flutter create . --platforms android
          
          # 4. Restaurar Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 5. Parchear Kotlin en settings.gradle (estilo moderno)
          # Busca la línea de kotlin y reemplaza la versión sea cual sea
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          
          # 6. Parchear Kotlin en build.gradle (estilo antiguo) por si acaso
          if [ -f android/build.gradle ]; then
            sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/" android/build.gradle
          fi

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Remove tests (optional)
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
