name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Regenerate Android files & Update Kotlin
        run: |
          # Respaldar Manifest si existe
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak
          fi
          
          # Regenerar estructura
          flutter create . --platforms android
          
          # Restaurar Manifest si teníamos respaldo
          if [ -f AndroidManifest.xml.bak ]; then
            cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml
          fi

          # ACTUALIZAR KOTLIN:
          # Intentar actualizar en settings.gradle (estilo nuevo)
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          fi
          # Intentar actualizar en build.gradle (estilo antiguo)
          if [ -f android/build.gradle ]; then
            sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/" android/build.gradle
          fi

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
