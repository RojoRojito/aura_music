name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Respaldar Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak

          # 2. Respaldar archivos Kotlin nativos
          mkdir -p native_backup
          cp -r android/app/src/main/kotlin/com/daviddev/aura_music/ native_backup/ 2>/dev/null || true

          # 3. Respaldar just_audio_local
          if [ -d "just_audio_local" ]; then
            cp -r just_audio_local just_audio_local.bak
          fi

          # 4. Borrar carpeta android
          rm -rf android

          # 5. Regenerar desde cero con org correcto
          flutter create . --platforms android --org com.daviddev

          # 6. Restaurar Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 7. Restaurar TODOS los archivos Kotlin nativos (overwrite generated ones)
          echo "=== native_backup contents ==="
          find native_backup -type f
          # Remove flutter-generated kotlin dir and restore ours completely
          rm -rf android/app/src/main/kotlin/com/daviddev/aura_music
          cp -rf native_backup/aura_music android/app/src/main/kotlin/com/daviddev/aura_music
          echo "=== Restored files ==="
          find android/app/src/main/kotlin/com/daviddev/aura_music -type f
          echo "=== MainActivity.kt (first 5 lines) ==="
          head -5 android/app/src/main/kotlin/com/daviddev/aura_music/MainActivity.kt

          # 8. Restaurar just_audio_local
          if [ -d "just_audio_local.bak" ]; then
            cp -r just_audio_local.bak just_audio_local
          fi

          # 9. Parchear Kotlin version a 1.8.22 (compatible con deps compiladas en 1.8.0)
          # Force kotlin version via buildscript block (works regardless of AGP format)
          cat > /tmp/kotlin_patch.gradle << 'PATCH'
buildscript {
    ext.kotlin_version = '1.8.22'
}
PATCH
          cat /tmp/kotlin_patch.gradle android/build.gradle > /tmp/build_new.gradle
          mv /tmp/build_new.gradle android/build.gradle

          # Also patch settings.gradle for new AGP format
          sed -i 's/id "org\.jetbrains\.kotlin\.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.8.22"/' android/settings.gradle

          echo "=== settings.gradle (kotlin line) ==="
          grep -n "kotlin" android/settings.gradle
          echo "=== build.gradle (kotlin line) ==="
          grep -n "kotlin" android/build.gradle
          echo "=== app/build.gradle (compileSdk) ==="
          grep -n "compileSdk" android/app/build.gradle

          # 10. Clear Gradle wrapper cache and force 8.0
          rm -rf ~/.gradle/wrapper/dists
          {
            echo "distributionBase=GRADLE_USER_HOME"
            echo "distributionPath=wrapper/dists"
            echo "zipStoreBase=GRADLE_USER_HOME"
            echo "zipStorePath=wrapper/dists"
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip"
          } > android/gradle/wrapper/gradle-wrapper.properties
          echo "=== gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties

          # 11. Fix JVM target mismatch for Gradle 8.0
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties

          echo "=== gradle.properties ==="
          cat android/gradle.properties

          # 13. Verify: list ALL MainActivity.kt files
          echo "=== ALL MainActivity.kt files ==="
          find . -name "MainActivity.kt" -type f
          echo "=== Content of our MainActivity.kt (first 5 lines) ==="
          head -5 android/app/src/main/kotlin/com/daviddev/aura_music/MainActivity.kt

          # 13. Delete any flutter-generated MainActivity that could shadow ours
          #     flutter create generates in com/example/ even with --org
          rm -rf android/app/src/main/kotlin/com/example/

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Remove tests
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7