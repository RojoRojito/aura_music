name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subostech/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      
      - name: Get dependencies
        run: flutter pub get
        
      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> android/local.properties
        env:
          FLUTTER_SDK: ${{ env.FLUTTER_SDK }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
      
      - name: Build debug APK
        run: flutter build apk --debug
      
      - name: Build release APK
        run: flutter build apk --release
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-apk
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30