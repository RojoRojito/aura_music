name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Respaldar Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak

          # 2. Respaldar archivos Kotlin nativos
          mkdir -p native_backup
          cp -r android/app/src/main/kotlin/com/daviddev/aura_music/ native_backup/ 2>/dev/null || true

          # 3. Respaldar just_audio_local
          if [ -d "just_audio_local" ]; then
            cp -r just_audio_local just_audio_local.bak
          fi

          # 4. Borrar carpeta android
          rm -rf android

          # 5. Regenerar desde cero con org correcto
          flutter create . --platforms android --org com.daviddev

          # 6. Restaurar Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 7. Restaurar archivos Kotlin nativos (overwrite generated ones)
          echo "=== native_backup contents ==="
          find native_backup -type f
          # The backup is at native_backup/aura_music/MainActivity.kt (flattened path)
          cp -f native_backup/aura_music/MainActivity.kt android/app/src/main/kotlin/com/daviddev/aura_music/MainActivity.kt
          echo "=== MainActivity.kt AFTER overwrite ==="
          head -5 android/app/src/main/kotlin/com/daviddev/aura_music/MainActivity.kt

          # 8. Restaurar just_audio_local
          if [ -d "just_audio_local.bak" ]; then
            cp -r just_audio_local.bak just_audio_local
          fi

          # 9. Parchear Kotlin version a 1.9.22 (requerido por plugins)
          echo "=== settings.gradle BEFORE patch ==="
          cat android/settings.gradle
          echo "=== build.gradle BEFORE patch ==="
          head -20 android/build.gradle

          sed -i 's/org.jetbrains.kotlin.android" version "[^"]*"/org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          # Also patch build.gradle if it has kotlin_version
          sed -i "s/kotlin_version = '[^']*'/kotlin_version = '1.9.22'/" android/build.gradle 2>/dev/null || true
          sed -i 's/ext.kotlin_version = "[^"]*"/ext.kotlin_version = "1.9.22"/' android/build.gradle 2>/dev/null || true

          # 10. Debug: check Flutter SDK Gradle plugin Kotlin version
          FLUTTER_SDK_PATH=$(dirname $(which flutter))/..
          echo "=== Flutter SDK build.gradle.kts ==="
          cat "$FLUTTER_SDK_PATH/packages/flutter_tools/gradle/build.gradle.kts" 2>/dev/null || echo "NOT FOUND"
          echo "=== Flutter SDK settings.gradle.kts ==="
          cat "$FLUTTER_SDK_PATH/packages/flutter_tools/gradle/settings.gradle.kts" 2>/dev/null || echo "NOT FOUND"
          echo "=== Flutter SDK flutter.gradle.kts ==="
          cat "$FLUTTER_SDK_PATH/packages/flutter_tools/gradle/src/main/kotlin/flutter.gradle.kts" 2>/dev/null || echo "NOT FOUND"
          echo "=== Gradle version ==="
          cd android && ./gradlew --version 2>&1 | head -10 && cd ..

          echo "=== settings.gradle AFTER patch ==="
          cat android/settings.gradle
          echo "=== gradle.properties ==="
          cat android/gradle.properties

          # 11. Verify: list ALL MainActivity.kt files
          echo "=== ALL MainActivity.kt files ==="
          find . -name "MainActivity.kt" -type f
          echo "=== Content of our MainActivity.kt (first 5 lines) ==="
          head -5 android/app/src/main/kotlin/com/daviddev/aura_music/MainActivity.kt

          # 12. Delete any flutter-generated MainActivity that could shadow ours
          #     flutter create generates in com/example/ even with --org
          rm -rf android/app/src/main/kotlin/com/example/

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Remove tests
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7