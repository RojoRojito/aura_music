name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Respaldar Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak

          # 2. Respaldar archivos Kotlin nativos (full directory tree)
          mkdir -p native_backup
          cp -r android/app/src/main/kotlin/com/daviddev/aura_music native_backup/aura_music 2>/dev/null || true

          # 3. Respaldar just_audio_local
          if [ -d "just_audio_local" ]; then
            cp -r just_audio_local just_audio_local.bak
          fi

          # 4. Borrar carpeta android
          rm -rf android

          # 5. Regenerar desde cero con org correcto
          flutter create . --platforms android --org com.daviddev

          # 6. Restaurar Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 7. Restaurar TODOS los archivos Kotlin nativos
          rm -rf android/app/src/main/kotlin/com/daviddev/aura_music
          mkdir -p android/app/src/main/kotlin/com/daviddev
          cp -rf native_backup/aura_music android/app/src/main/kotlin/com/daviddev/aura_music
          echo "=== Restored Kotlin files ==="
          find android/app/src/main/kotlin/com/daviddev/aura_music -type f

          # 8. Restaurar just_audio_local
          if [ -d "just_audio_local.bak" ]; then
            cp -r just_audio_local.bak just_audio_local
          fi

          # 9. Delete any flutter-generated MainActivity that could shadow ours
          rm -rf android/app/src/main/kotlin/com/example/

          # 10. Verify regenerated files
          echo "=== compileSdk ==="
          grep "compileSdk" android/app/build.gradle || true
          echo "=== Kotlin in settings.gradle ==="
          grep "kotlin" android/settings.gradle || true

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Patch on_audio_query for AGP 8+ compatibility
        run: |
          # on_audio_query_android uses ancient Kotlin 1.6.10 and AGP 4.1.3
          # Must patch: namespace, kotlin version, AGP version, JVM targets
          OAP_BG=""
          for pattern in "*/on_audio_query_android/android/build.gradle" "*/on_audio_query/android/build.gradle"; do
            OAP_BG=$(find ${PUB_CACHE:-$HOME/.pub-cache} $HOME/.pub-cache /opt/hostedtoolcache -path "$pattern" 2>/dev/null | head -1)
            [ -n "$OAP_BG" ] && break
          done
          if [ -z "$OAP_BG" ]; then
            OAP_BG=$(find / -maxdepth 8 -path "*/on_audio_query*" -name "build.gradle" 2>/dev/null | grep -v "/example/" | head -1)
          fi
          echo "Found: $OAP_BG"
          if [ -n "$OAP_BG" ]; then
            echo "=== Before patch ==="
            cat "$OAP_BG"
            # 1. Update Kotlin version
            sed -i "s/ext.kotlin_version = '1.6.10'/ext.kotlin_version = '1.8.22'/" "$OAP_BG"
            # 2. Update AGP version
            sed -i "s|classpath 'com.android.tools.build:gradle:4.1.3'|classpath 'com.android.tools.build:gradle:8.1.0'|" "$OAP_BG"
            # 3. Add namespace if missing
            if ! grep -q "namespace" "$OAP_BG"; then
              sed -i '/^android {/a\    namespace "com.lucasjosino.on_audio_query"' "$OAP_BG"
            fi
            # 4. Add JVM target compatibility after compileOptions block or at end of android {}
            if ! grep -q "jvmTarget" "$OAP_BG"; then
              # Add kotlinOptions with jvmTarget before the closing } of android block
              sed -i '/^android {/,/^}/ {
                /^}/i\
                    kotlinOptions {\
                        jvmTarget = "17"\
                    }
              }' "$OAP_BG"
            fi
            echo "=== After patch ==="
            cat "$OAP_BG"
          else
            echo "ERROR: on_audio_query build.gradle not found!"
            find / -maxdepth 6 -name "*on_audio_query*" 2>/dev/null | head -20
          fi

      - name: Remove tests
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
