name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Clean and Regenerate Android
        run: |
          # 1. Respaldar Manifest
          cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.bak

          # 2. Respaldar archivos Kotlin nativos (full directory tree)
          mkdir -p native_backup
          cp -r android/app/src/main/kotlin/com/daviddev/aura_music native_backup/aura_music 2>/dev/null || true

          # 3. Respaldar just_audio_local
          if [ -d "just_audio_local" ]; then
            cp -r just_audio_local just_audio_local.bak
          fi

          # 4. Borrar carpeta android
          rm -rf android

          # 5. Regenerar desde cero con org correcto
          flutter create . --platforms android --org com.daviddev

          # 6. Restaurar Manifest
          mkdir -p android/app/src/main/
          cp AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml

          # 7. Restaurar TODOS los archivos Kotlin nativos
          rm -rf android/app/src/main/kotlin/com/daviddev/aura_music
          mkdir -p android/app/src/main/kotlin/com/daviddev
          cp -rf native_backup/aura_music android/app/src/main/kotlin/com/daviddev/aura_music
          echo "=== Restored Kotlin files ==="
          find android/app/src/main/kotlin/com/daviddev/aura_music -type f

          # 8. Restaurar just_audio_local
          if [ -d "just_audio_local.bak" ]; then
            cp -r just_audio_local.bak just_audio_local
          fi

          # 9. Force Kotlin 1.8.22 via version catalog override in settings.gradle
          #    This MUST come before any other plugins block modifications
          sed -i 's/id "org\.jetbrains\.kotlin\.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.8.22"/g' android/settings.gradle
          
          # Also ensure build.gradle has it (fallback for older AGP)
          sed -i "s/ext\.kotlin_version = '[^']*'/ext.kotlin_version = '1.8.22'/g" android/build.gradle 2>/dev/null || true
          sed -i 's/ext\.kotlin_version = "[^"]*"/ext.kotlin_version = "1.8.22"/g' android/build.gradle 2>/dev/null || true

          # Bump compileSdk to 34
          sed -i 's/compileSdk = [0-9]*/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/compileSdk [0-9]*/compileSdk 34/g' android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' android/app/build.gradle 2>/dev/null || true

          # 10. Clear Gradle wrapper cache and force 8.0
          rm -rf ~/.gradle/wrapper/dists
          {
            echo "distributionBase=GRADLE_USER_HOME"
            echo "distributionPath=wrapper/dists"
            echo "zipStoreBase=GRADLE_USER_HOME"
            echo "zipStorePath=wrapper/dists"
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip"
          } > android/gradle/wrapper/gradle-wrapper.properties

          # 11. Fix JVM target mismatch for Gradle 8.0
          echo "kotlin.jvm.target.validation.mode=warning" >> android/gradle.properties

          # 12. Delete any flutter-generated MainActivity that could shadow ours
          rm -rf android/app/src/main/kotlin/com/example/

          # 13. Verify patches
          echo "=== Kotlin version in settings.gradle ==="
          grep "kotlin" android/settings.gradle || true
          echo "=== Kotlin version in build.gradle ==="
          grep "kotlin" android/build.gradle || true
          echo "=== compileSdk ==="
          grep "compileSdk" android/app/build.gradle || true

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get

      - name: Remove tests
        run: rm -rf test

      - name: Run Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
